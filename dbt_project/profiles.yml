spotify_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SPOTIFY_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'SPOTIFY_DB') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'SPOTIFY_WH') }}"
      schema: RAW_SPOTIFY
      threads: 4
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SPOTIFY_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'SPOTIFY_DB') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'SPOTIFY_WH') }}"
      schema: ANALYTICS
      threads: 8
