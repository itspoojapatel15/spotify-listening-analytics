version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    build: .
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-SPOTIFY_WH}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-SPOTIFY_DB}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-SPOTIFY_ROLE}
    depends_on:
      postgres: {condition: service_healthy}
    restart: "no"

  airflow-webserver:
    build: .
    command: airflow webserver --port 8080
    environment: *airflow-env
    ports: ["8080:8080"]
    depends_on: [airflow-init]
    volumes:
      - ./dags:/opt/airflow/dags
      - ./extractors:/opt/airflow/extractors
      - ./loaders:/opt/airflow/loaders
      - ./config:/opt/airflow/config
      - ./dbt_project:/opt/airflow/dbt_project
    restart: always

  airflow-scheduler:
    build: .
    command: airflow scheduler
    environment: *airflow-env
    depends_on: [airflow-init]
    volumes:
      - ./dags:/opt/airflow/dags
      - ./extractors:/opt/airflow/extractors
      - ./loaders:/opt/airflow/loaders
      - ./config:/opt/airflow/config
      - ./dbt_project:/opt/airflow/dbt_project
    restart: always

  streamlit:
    build: .
    command: streamlit run streamlit_app/app.py --server.port 8501
    environment:
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    ports: ["8501:8501"]

volumes:
  postgres-data:
